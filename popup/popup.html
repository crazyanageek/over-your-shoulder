<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Over Your Shoulder</title>
    <link rel="stylesheet" href="../report/fonts.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup" id="popup-root">
      <div class="pause-bar" aria-hidden="true"></div>
      <p class="pause-notice" id="pause-notice">Paused · no data is being recorded</p>
      <header class="pop-mast">
        <p class="pop-title">
          <span class="mast-muted">Who is</span>
          <span class="mast-strong">looking over your shoulder?</span>
        </p>
      </header>

      <section class="pop-hero">
        <p class="pop-num" id="popup-today">0</p>
        <p class="pop-label">Requests today</p>
        <p class="pop-cumulative" id="popup-cumulative">— since install</p>
      </section>

      <section class="pop-score">
        <div class="pop-ring">
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="ring-bg" cx="60" cy="60" r="52" />
            <circle class="ring-fill" id="popup-ring-fill" cx="60" cy="60" r="52"
                    stroke="#CC9500" stroke-dasharray="0 327" />
          </svg>
          <div class="pop-ring-center">
            <span class="num" id="popup-score">0</span>
          </div>
        </div>
        <div class="pop-score-side">
          <p class="pop-score-label">Exposure</p>
          <p class="pop-verdict" id="popup-verdict">—</p>
        </div>
      </section>

      <div class="pop-actions">
        <button id="open-report" class="pop-btn primary" type="button">OPEN DAILY REPORT →</button>
        <button id="toggle" class="pop-btn secondary" type="button">Pause</button>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
