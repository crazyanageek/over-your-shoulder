<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Over Your Shoulder — Daily Report</title>
    <link rel="stylesheet" href="fonts.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="badge-stage">
    <div class="badge">
      <div class="banner" id="banner" hidden></div>
      <header class="masthead">
        <div class="punchline">"Your browser had a chattier day than you."</div>
        <div class="dateline">
          <span>—</span>
          <span>—</span>
        </div>
      </header>

      <section class="hero">
        <div class="hero-top">
          <h1 class="hero-title">
            Who is looking
            <span class="strong">over your shoulder?</span>
          </h1>
          <div class="hero-number-wrap">
            <div class="hero-number" id="hero-number">0</div>
          </div>
        </div>
        <p class="hero-sub">
          <span class="caption-label">Requests your browser has sent to AI servers</span>
          —
        </p>
      </section>

      <section class="score-band">
        <div class="ring">
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="ring-bg" cx="60" cy="60" r="52" />
            <circle class="ring-fill" cx="60" cy="60" r="52" stroke="#CC9500" stroke-dasharray="0 327" />
          </svg>
          <div class="ring-center">
            <p class="num">0</p>
            <span class="den">/ 100</span>
          </div>
        </div>
        <div class="composition">
          <div class="c-header">
            <span>Exposure makeup</span>
            <span class="verdict">—</span>
          </div>
          <div class="c-bar" aria-label="Score composition"></div>
          <div class="c-legend"></div>
        </div>
      </section>

      <section class="map-band">
        <h2 class="map-headline">—</h2>
        <svg id="worldmap" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="destinations-list"></div>
      </section>

      <section class="stats-row">
        <div class="stat alarm">
          <p class="value">—</p>
          <div class="label">Routed to USA</div>
        </div>
        <div class="stat">
          <p class="value">—</p>
          <div class="label">Cities</div>
        </div>
        <div class="stat">
          <p class="value">—</p>
          <div class="label">AI vendors contacted</div>
        </div>
      </section>

      <footer class="foot">
        <div class="left">
          <svg class="swiss-flag" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-label="Swiss flag">
            <rect width="32" height="32" fill="#D52B1E" />
            <path d="M13 6 h6 v7 h7 v6 h-7 v7 h-6 v-7 h-7 v-6 h7 z" fill="#FFFFFF" />
          </svg>
          <span>Nothing leaves your device</span>
        </div>
        <div class="share-group">
          <button id="download-btn" class="share-btn primary" type="button">↓ Download card</button>
          <a id="share-linkedin" class="share-icon" href="#" target="_blank" rel="noopener noreferrer" title="Share on LinkedIn" aria-label="Share on LinkedIn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM8.34 18.34V10.5H5.67v7.84zm-1.33-9a1.55 1.55 0 1 0 0-3.1 1.55 1.55 0 0 0 0 3.1zm11.33 9V14c0-2.47-1.32-3.62-3.08-3.62a2.66 2.66 0 0 0-2.42 1.33h-.03V10.5H10.2v7.84h2.67v-3.88c0-1.02.2-2.01 1.47-2.01s1.26 1.17 1.26 2.07v3.82z"/>
            </svg>
          </a>
          <a id="share-x" class="share-icon" href="#" target="_blank" rel="noopener noreferrer" title="Share on X" aria-label="Share on X">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </a>
        </div>
      </footer>
    </div>

    </div>
    <script src="lib/d3.min.js"></script>
    <script src="lib/topojson-client.min.js"></script>
    <script type="module" src="report.js"></script>
  </body>
</html>
